<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dz-Doc | المنصة الوطنية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #002b5b; --accent: #007bff; --success: #25d366; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; text-align: center; }
        header { background: var(--primary); color: white; padding: 30px 15px; border-radius: 0 0 35px 35px; }
        .search-area { position: relative; max-width: 500px; margin: -25px auto 20px; padding: 0 20px; }
        .search-input { width: 100%; padding: 15px 20px; border: none; border-radius: 50px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); font-size: 16px; outline: none; box-sizing: border-box; }
        .dropdown { position: absolute; top: 100%; left: 30px; right: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-height: 250px; overflow-y: auto; z-index: 100; display: none; margin-top: 5px; }
        .dropdown-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #f1f1f1; text-align: right; }
        .dropdown-item:hover { background: #f0f7ff; color: var(--accent); }
        .results-container { padding: 10px; max-width: 600px; margin: auto; }
        .doctor-card { background: white; margin: 15px 0; padding: 20px; border-radius: 20px; border-right: 6px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: right; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; text-decoration: none; text-align: center; font-weight: bold; font-size: 14px; color: white; }
        .btn-map { background: var(--accent); }
        .btn-wa { background: var(--success); }
    </style>
</head>
<body>

<header>
    <h1>🇩🇿 منصة أطباء الجزائر</h1>
    <p>البحث الذكي في 69 ولاية</p>
</header>

<div class="search-area">
    <input type="text" id="wilayaInput" class="search-input" placeholder="🔍 ابحث عن ولايتك (مثلاً: خنشلة)..." oninput="handleSearch()">
    <div id="dropdown" class="dropdown"></div>
</div>

<div id="results" class="results-container">
    <p style="color: #888; margin-top: 40px;">اختر الولاية لعرض الأطباء المتاحين</p>
</div>

<script>
// قائمة الولايات الـ 69 كاملة
const wilayas = [
    "01 - أدرار", "02 - الشلف", "03 - الأغواط", "04 - أم البواقي", "05 - باتنة", "06 - بجاية", "07 - بسكرة", "08 - بشار", "09 - البليدة", "10 - البويرة",
    "11 - تمنراست", "12 - تبسة", "13 - تلمسان", "14 - تيارت", "15 - تيزي وزو", "16 - الجزائر", "17 - الجلفة", "18 - جيجل", "19 - سطيف", "20 - سعيدة",
    "21 - سكيكدة", "22 - سيدي بلعباس", "23 - عنابة", "24 - قالمة", "25 - قسنطينة", "26 - المدية", "27 - مستغانم", "28 - المسيلة", "29 - معسكر", "30 - ورقلة",
    "31 - وهران", "32 - البيض", "33 - إليزي", "34 - برج بوعريريج", "35 - بومرداس", "36 - الطارف", "37 - تندوف", "38 - تسمسيلت", "39 - الوادي", "40 - خنشلة",
    "41 - سوق أهراس", "42 - تيبازة", "43 - ميلة", "44 - عين الدفلى", "45 - النعامة", "46 - عين تموشنت", "47 - غرداية", "48 - غليزان", "49 - تيميمون", "50 - برج باجي مختار",
    "51 - أولاد جلال", "52 - بني عباس", "53 - عين صالح", "54 - عين قزام", "55 - تقرت", "56 - جانت", "57 - المغير", "58 - المنيعة", "59 - تيميمون الجديدة", "60 - برج باجي مختار الجديدة",
    "61 - أولاد جلال الجديدة", "62 - بني عباس الجديدة", "63 - عين صالح الجديدة", "64 - عين قزام الجديدة", "65 - تقرت الجديدة", "66 - جانت الجديدة", "67 - المغير الجديدة", "68 - المنيعة الجديدة", "69 - منيعة"
];

// قاعدة البيانات (تم حذف د. عمارة وابن سينا)
const doctorsDB = [
    // هنا ستضيف بياناتك الحقيقية لاحقاً
];

function handleSearch() {
    const input = document.getElementById('wilayaInput');
    const dropdown = document.getElementById('dropdown');
    const val = input.value.trim();
    dropdown.innerHTML = '';
    
    if (!val) { dropdown.style.display = 'none'; return; }

    const matches = wilayas.filter(w => w.includes(val));
    if (matches.length > 0) {
        dropdown.style.display = 'block';
        matches.forEach(m => {
            const div = document.createElement('div');
            div.className = 'dropdown-item';
            div.textContent = m;
            div.onclick = () => selectWilaya(m);
            dropdown.appendChild(div);
        });
    } else {
        dropdown.style.display = 'none';
    }
}

function selectWilaya(name) {
    document.getElementById('wilayaInput').value = name;
    document.getElementById('dropdown').style.display = 'none';
    renderResults(name);
}

function renderResults(wilayaName) {
    const res = document.getElementById('results');
    const filtered = doctorsDB.filter(d => d.wilaya === wilayaName);
    
    if (filtered.length === 0) {
        res.innerHTML = `<p style="margin-top:30px; color:#999;">لا يوجد أطباء مسجلين حالياً في ${wilayaName}</p>`;
    } else {
        res.innerHTML = '';
        filtered.forEach(d => {
            res.innerHTML += `
                <div class="doctor-card">
                    <h3>${d.name}</h3>
                    <p><i class="fas fa-user-md"></i> ${d.spec} | ${d.wilaya}</p>
                    <div class="btn-group">
                        <a href="${d.map}" target="_blank" class="btn btn-map">📍 الموقع</a>
                        <a href="https://wa.me/${d.tel}" class="btn btn-wa">💬 واتساب</a>
                    </div>
                </div>`;
        });
    }
}
</script>
</body>
</html>

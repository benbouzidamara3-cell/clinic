<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dz-Doc | المنصة الوطنية</title>
    <style>
        :root { --primary: #0077b6; --dark: #03045e; --success: #25d366; }
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding: 0; text-align: center; }
        header { background: var(--dark); color: white; padding: 25px; border-radius: 0 0 20px 20px; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .card { background: white; padding: 15px; margin: 15px 0; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-right: 5px solid var(--primary); text-align: right; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 14px; }
        .btn-map { background: var(--primary); }
        .btn-wa { background: var(--success); }
    </style>
</head>
<body>
    <header>
        <h1>🇩🇿 منصة أطباء الجزائر</h1>
        <p>دليل الـ 69 ولاية</p>
    </header>
    <div class="container">
        <select id="wilaya" onchange="filter()">
            <option value="">-- اختر الولاية --</option>
            <option value="40">40 - خنشلة</option>
            <option value="16">16 - الجزائر العاصمة</option>
            <option value="31">31 - وهران</option>
            <option value="19">19 - سطيف</option>
        </select>
        <input type="text" id="search" placeholder="ابحث باسم الطبيب أو التخصص..." onkeyup="filter()">
        <div id="results"></div>
    </div>
    <script>
        const docs = [
            { n: "دكتور بن بوزيد عمار", s: "طب عام", w: "40", t: "213667710260", m: "https://maps.google.com" },
            { n: "عيادة ابن سينا", s: "أخصائي عظام", w: "40", t: "213667710260", m: "https://maps.google.com" }
        ];
        function filter() {
            const w = document.getElementById('wilaya').value;
            const s = document.getElementById('search').value.toLowerCase();
            const res = document.getElementById('results');
            res.innerHTML = '';
            docs.filter(d => (w==='' || d.w===w) && (d.n.includes(s) || d.s.includes(s))).forEach(d => {
                res.innerHTML += `<div class="card"><h3>${d.n}</h3><p>${d.s} | ولاية ${d.w}</p>
                <div class="btn-group"><a href="${d.m}" target="_blank" class="btn btn-map">📍 الخريطة</a>
                <a href="https://wa.me/${d.t}" class="btn btn-wa">💬 واتساب</a></div></div>`;
            });
        }
        filter();
    </script>
</body>
</html>

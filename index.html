<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dz-Doc | منصة أطباء الجزائر</title>
    <style>
        :root { --primary: #002b5b; --accent: #007bff; --success: #25d366; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: var(--primary); color: white; padding: 35px 15px; text-align: center; border-radius: 0 0 40px 40px; }
        .search-area { position: relative; max-width: 500px; margin: -30px auto 20px; padding: 0 20px; }
        .search-input { width: 100%; padding: 18px 25px; border: none; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-size: 17px; outline: none; box-sizing: border-box; cursor: pointer; text-align: right; }
        .dropdown { position: absolute; top: 100%; left: 30px; right: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-height: 400px; overflow-y: auto; z-index: 1000; display: none; margin-top: 5px; border: 1px solid #eee; }
        .dropdown-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #f1f1f1; text-align: right; font-weight: 500; }
        .dropdown-item:hover { background: #f0f7ff; color: var(--accent); }
        .results-container { padding: 10px; max-width: 600px; margin: auto; }
        .doctor-card { background: white; margin: 15px 0; padding: 20px; border-radius: 20px; border-right: 8px solid var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: right; }
    </style>
</head>
<body>

<header>
    <h1>🇩🇿 منصة أطباء الجزائر</h1>
    <p>البحث الرسمي في 68 ولاية ومنطقة إدارية</p>
</header>

<div class="search-area">
    <input type="text" id="wilayaInput" class="search-input" placeholder="🔍 اضغط هنا لاختيار أو البحث عن الولاية..." 
           onclick="toggleDropdown()" oninput="handleSearch()" autocomplete="off">
    <div id="dropdown" class="dropdown"></div>
</div>

<div id="results" class="results-container"></div>

<script>
// قائمة الـ 68 ولاية ومنطقة إدارية كاملة
const wilayas = [
    "01 - أدرار", "02 - الشلف", "03 - الأغواط", "04 - أم البواقي", "05 - باتنة", "06 - بجاية", "07 - بسكرة", "08 - بشار", "09 - البليدة", "10 - البويرة",
    "11 - تمنراست", "12 - تبسة", "13 - تلمسان", "14 - تيارت", "15 - تيزي وزو", "16 - الجزائر", "17 - الجلفة", "18 - جيجل", "19 - سطيف", "20 - سعيدة",
    "21 - سكيكدة", "22 - سيدي بلعباس", "23 - عنابة", "24 - قالمة", "25 - قسنطينة", "26 - المدية", "27 - مستغانم", "28 - المسيلة", "29 - معسكر", "30 - ورقلة",
    "31 - وهران", "32 - البيض", "33 - إليزي", "34 - برج بوعريريج", "35 - بومرداس", "36 - الطارف", "37 - تندوف", "38 - تسمسيلت", "39 - الوادي", "40 - خنشلة",
    "41 - سوق أهراس", "42 - تيبازة", "43 - ميلة", "44 - عين الدفلى", "45 - النعامة", "46 - عين تموشنت", "47 - غرداية", "48 - غليزان",
    "49 - تيميمون", "50 - برج باجي مختار", "51 - أولاد جلال", "52 - بني عباس", "53 - عين صالح", "54 - عين قزام", "55 - تقرت", "56 - جانت", "57 - المغير", "58 - المنيعة",
    "59 - آفلو", "60 - قصر الشلالة", "61 - عين وسارة", "62 - مسعد", "63 - لبيض سيدي الشيخ", "64 - بوسعادة", "65 - تقرت (منتدبة)", "66 - المنيعة (منتدبة)", "67 - بريكة", "68 - العلمة"
];

const input = document.getElementById('wilayaInput');
const dropdown = document.getElementById('dropdown');

function toggleDropdown() {
    renderDropdown(wilayas);
}

function handleSearch() {
    const val = input.value.trim();
    const matches = wilayas.filter(w => w.includes(val));
    renderDropdown(matches);
}

function renderDropdown(list) {
    dropdown.innerHTML = '';
    if (list.length > 0) {
        dropdown.style.display = 'block';
        list.forEach(m => {
            const div = document.createElement('div');
            div.className = 'dropdown-item';
            div.textContent = m;
            div.onclick = () => {
                input.value = m;
                dropdown.style.display = 'none';
                showResults(m);
            };
            dropdown.appendChild(div);
        });
    } else {
        dropdown.style.display = 'none';
    }
}

// إغلاق القائمة عند الضغط خارجها
document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-area')) dropdown.style.display = 'none';
});

function showResults(wilayaName) {
    const res = document.getElementById('results');
    res.innerHTML = `<p style="text-align:center; color:#888; margin-top:50px;">تم اختيار ${wilayaName}.<br>لا يوجد أطباء حقيقيون مضافون حالياً في هذا القسم.</p>`;
}
</script>
</body>
</html>
